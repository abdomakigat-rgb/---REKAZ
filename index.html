<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ab Maki - Real Live Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div class="absolute top-4 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-3">
        <div class="flex gap-2 items-center bg-zinc-900 p-2 rounded-full border border-white/10 shadow-2xl">
            <span class="text-xs text-gray-400 px-2">ID البث الخاص بك: <span id="my-id" class="text-cyan-400 font-mono">جاري التحميل...</span></span>
            <button onclick="copyInviteLink()" class="bg-cyan-600 text-xs px-4 py-1 rounded-full font-bold hover:bg-cyan-500 transition-all">
                نسخ رابط الدعوة 🔗
            </button>
        </div>

        <div class="flex gap-2 p-1 bg-black/50 backdrop-blur rounded-lg border border-white/5">
            <input id="join-id-input" type="text" placeholder="اكتب ID البث هنا..." class="bg-zinc-800 text-xs p-2 rounded border border-white/10 outline-none focus:border-cyan-500 w-40">
            <button onclick="joinByInputId()" class="bg-green-600 text-[10px] px-3 py-1 rounded font-bold hover:bg-green-500 transition-all">دخول</button>
        </div>
    </div>

    <div class="relative w-full h-[85vh] bg-black group">
        <video id="main-stream" autoplay playsinline class="w-full h-full object-contain"></video>

        <div class="absolute top-20 left-8 bg-red-600 px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3 animate-bounce">
            <i class="fas fa-bell"></i>
            <span class="font-black text-lg">اشترك يا مكي! 🔥</span>
        </div>

        <div class="absolute bottom-0 w-full glass py-3 overflow-hidden z-20">
            <div class="animate-marquee whitespace-nowrap text-xl font-bold text-cyan-400">
                🚀 بث مباشر حقيقي من استوديو مكي - شارك الرابط مع أصحابك ليدخلوا البث الآن 🚀
            </div>
        </div>

        <div class="absolute right-0 top-0 w-72 h-full glass p-4 z-10">
            <div class="border-b border-white/10 pb-2 mb-4 font-bold text-cyan-400">الدردشة المباشرة</div>
            <div id="messages-container" class="space-y-3 h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <div class="h-[15vh] bg-[#0a0a0a] border-t border-white/5 flex items-center justify-between px-10">
        <div class="flex gap-4">
            <button onclick="startScreenShare()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold flex items-center gap-2">
                <i class="fas fa-desktop"></i> مشاركة الشاشة
            </button>
            <button onclick="startCamera()" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl font-bold flex items-center gap-2">
                <i class="fas fa-camera"></i> الكاميرا
            </button>
        </div>

        <div class="flex items-center gap-4">
            <div id="status-dot" class="flex items-center gap-2 text-gray-500">
                <span class="w-3 h-3 bg-gray-500 rounded-full"></span>
                <span id="status-text font-bold">غير متصل</span>
            </div>
            <button id="live-btn" onclick="toggleLive()" class="bg-green-600 hover:bg-green-700 px-10 py-4 rounded-2xl font-black text-lg transition-all shadow-lg">
                بدء البث الحقيقي
            </button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('main-stream');
        const messagesContainer = document.getElementById('messages-container');
        const myIdDisplay = document.getElementById('my-id');
        let currentStream;
        let peer;

        // 1. إعداد نظام الـ Peer للربط الحقيقي
        peer = new Peer(); // بينشئ ID خاص بيك

        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            console.log('ID الخاص بك هو: ' + id);
        });

        // استقبال مكالمات المشاهدين
        peer.on('call', (call) => {
            if (currentStream) {
                call.answer(currentStream); // ابعت لهم الفيديو بتاعك
            }
        });

        // 2. تشغيل الكاميرا
        async function startCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = currentStream;
                videoElement.muted = true; // عشان متسمعش صوتك مرتين
            } catch (err) { alert("افتح الكاميرا أولاً يا مكي!"); }
        }

        // 3. تشغيل مشاركة الشاشة (شغال حقيقي)
        async function startScreenShare() {
            try {
                currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoElement.srcObject = currentStream;
                
                // لو قفل مشاركة الشاشة من زرار المتصفح
                currentStream.getVideoTracks()[0].onended = () => {
                    startCamera(); 
                };
            } catch (err) { console.error(err); }
        }

        // 4. نسخ رابط الدعوة
        function copyInviteLink() {
            const id = myIdDisplay.innerText;
            if(id === "جاري التحميل...") return alert("انتظر حتى يتم إنشاء الـ ID");
            
            // الرابط ده هيكون فيه الـ ID بتاعك
            const link = window.location.href.split('?')[0] + "?join=" + id;
            navigator.clipboard.writeText(link);
            alert("تم نسخ رابط البث! ابعته لأصحابك في واتساب.");
        }

        // 5. الانضمام عن طريق كتابة الـ ID (الميزة الجديدة)
        function joinByInputId() {
            const id = document.getElementById('join-id-input').value;
            if(id) {
                window.location.href = window.location.href.split('?')[0] + "?join=" + id;
            } else {
                alert("اكتب الـ ID الأول يا مكي!");
            }
        }

        // 6. التحقق لو فيه حد داخل من الرابط (مشاهد)
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');

        if (joinId) {
            // لو أنا داخل كمشاهد
            document.body.innerHTML = `
                <div class="h-screen bg-black flex flex-col items-center justify-center p-4">
                    <h1 class="mb-4 text-cyan-400 font-bold text-xl animate-pulse text-center">أنت الآن تشاهد بث Ab Maki المباشر 🎥</h1>
                    <video id="viewer-video" autoplay playsinline class="w-full max-w-4xl bg-zinc-900 rounded-2xl shadow-2xl border border-white/10"></video>
                    <p class="mt-4 text-gray-500">جاري الاتصال بصاحب البث... لو طوّل يبقى مكي لسه ما بدأش</p>
                    <button onclick="location.href=window.location.href.split('?')[0]" class="mt-6 text-xs text-zinc-500 underline">العودة كصاحب استوديو</button>
                </div>
            `;
            const viewerVideo = document.getElementById('viewer-video');
            const call = peer.call(joinId, new MediaStream()); // اتصال وهمي لطلب الفيديو
            call.on('stream', (remoteStream) => {
                viewerVideo.srcObject = remoteStream;
            });
        }

        function toggleLive() {
            if(!currentStream) return alert("شغل الكاميرا أو الشاشة الأول!");
            const btn = document.getElementById('live-btn');
            btn.innerText = "البث شغال ✅";
            btn.className = "bg-zinc-700 px-10 py-4 rounded-2xl font-black text-lg opacity-50 cursor-not-allowed";
            document.getElementById('status-dot').querySelector('span').className = "w-3 h-3 bg-red-600 rounded-full animate-pulse";
            alert("البث بدأ! أي حد معاه الرابط أو الـ ID هيقدر يشوفك دلوقتي.");
        }

        // محاكاة تعليقات
        setInterval(() => {
            const names = ["مكي فانز", "يوتيوبر", "إبراهيم"];
            const msgs = ["عاش يا بطل", "إزاي شاركت الشاشة؟", "منور الدنيا"];
            const html = `<div class="bg-white/5 p-2 rounded border-r-2 border-cyan-500 text-sm">
                <span class="text-cyan-400 block text-xs">${names[Math.floor(Math.random()*names.length)]}</span>
                ${msgs[Math.floor(Math.random()*msgs.length)]}
            </div>`;
            if(messagesContainer) messagesContainer.insertAdjacentHTML('afterbegin', html);
        }, 4000);

    </script>
</body>
</html>
